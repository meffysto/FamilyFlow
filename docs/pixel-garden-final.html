<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Flow Garden — Mana Seed Assets</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0f0f1a;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Courier New',monospace;padding:16px;gap:10px;}
  h1{color:#c8b88a;font-size:16px;letter-spacing:2px;text-transform:uppercase;}
  .controls{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
  .btn{background:#2a2a3d;color:#a09080;border:2px solid #3d3d52;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'Courier New',monospace;text-transform:uppercase;letter-spacing:1px;}
  .btn:hover{background:#3d3d52;}
  .btn.active{background:#5c4a2a;border-color:#8c7a4a;color:#f0e0c0;}
  .phone{width:393px;height:780px;border-radius:40px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,0.6);border:3px solid #222;}
  canvas{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}
</style>
</head>
<body>
<h1>Family Flow Garden</h1>
<div class="controls" id="sc">
  <button class="btn active" onclick="setStage(0)">Graine</button>
  <button class="btn" onclick="setStage(1)">Pousse</button>
  <button class="btn" onclick="setStage(2)">Arbuste</button>
  <button class="btn" onclick="setStage(3)">Arbre+Fruits</button>
</div>
<div class="controls" id="tc">
  <button class="btn active" onclick="setTree(0)">Pommier</button>
  <button class="btn" onclick="setTree(1)">Oranger</button>
  <button class="btn" onclick="setTree(2)">Pecher</button>
  <button class="btn" onclick="setTree(3)">Prunier</button>
  <button class="btn" onclick="setTree(4)">Poirier</button>
</div>
<div class="controls" id="ssc">
  <button class="btn active" onclick="setSeason(0)">Printemps</button>
  <button class="btn" onclick="setSeason(1)">Ete</button>
  <button class="btn" onclick="setSeason(2)">Automne</button>
  <button class="btn" onclick="setSeason(3)">Hiver</button>
</div>
<div class="phone"><canvas id="c"></canvas></div>

<script>
const W=196,H=390,canvas=document.getElementById('c');
canvas.width=W;canvas.height=H;
const ctx=canvas.getContext('2d');

let time=0,stageIdx=0,treeIdx=0,seasonIdx=0;
let particles=[],animals=[];

// Assets
const treeFiles=['trees/apple_red.png','trees/orange.png','trees/peach.png','trees/plum.png','trees/pear.png'];
const imgs={};
let loaded=0,total=0;

function loadImg(k,src){
  total++;
  imgs[k]=new Image();
  imgs[k].onload=imgs[k].onerror=()=>{loaded++;if(loaded>=total)requestAnimationFrame(render);};
  imgs[k].src='demo-assets/'+src;
}
treeFiles.forEach((f,i)=>loadImg('tree'+i,f));
loadImg('chicken','livestock/chicken.png');
loadImg('duck','livestock/duck.png');
loadImg('chick','livestock/chick.png');
loadImg('objects','objects.png');
loadImg('accessories','livestock/accessories.png');

// Tree spritesheet layout (48x64 cells)
// Columns: stage1, stage2, stage3, stage4-top, stage4-stump, stage4-fruit, stage4-fruit-top
// Rows: spring, summer, early-autumn, autumn, winter, snow, shadow-variants
const TW=48,TH=64;

// Season row mapping (approximate)
// Row 0: Spring, Row 1: Summer, Row 2: Early autumn, Row 3: Autumn, Row 4: Winter, Row 5: Snow
const SEASON_ROW=[0,1,3,4]; // spring, summer, autumn, winter

// Stage column: 0=stage1, 1=stage2, 2=stage3, 3=stage4(full), 5=stage4+fruit
function getTreeCol(stage){
  if(stage<3)return stage;
  return 5; // fruit bearing version for stage 4
}

// Chicken spritesheet: 512x512, 8 cols x 8 rows, each cell ~64x64
// Row 0: walk down, Row 1: walk left, Row 2: walk up, Row 3: walk right
// Row 4-5: idle, Row 6-7: peck
const CW=64,CH=64;

// Duck: 192x224, 6 cols x 7 rows, each cell 32x32
const DW=32,DH=32;

// Chick: smaller
const KW=32,KH=32;

function seed(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};}

// ─── Animals state ───
function initAnimals(){
  animals=[
    {type:'chicken',x:25,y:0,dir:0,frame:0,speed:0.3,range:20,base:25,timer:0},
    {type:'duck',x:150,y:0,dir:0,frame:0,speed:0.2,range:15,base:150,timer:0},
    {type:'chick',x:60,y:0,dir:0,frame:0,speed:0.4,range:12,base:60,timer:0},
    {type:'chick',x:75,y:0,dir:0,frame:0,speed:0.35,range:10,base:75,timer:0},
  ];
}
initAnimals();

function render(){
  time+=0.016;
  ctx.clearRect(0,0,W,H);
  const gY=238;

  // ── Sky ──
  const skyCols=[
    [{p:0,c:[130,185,225]},{p:0.5,c:[165,210,238]},{p:1,c:[210,230,200]}], // spring
    [{p:0,c:[95,175,225]},{p:0.5,c:[140,205,235]},{p:1,c:[185,220,180]}],  // summer
    [{p:0,c:[160,150,170]},{p:0.5,c:[190,170,150]},{p:1,c:[210,195,160]}], // autumn
    [{p:0,c:[180,195,210]},{p:0.5,c:[200,210,220]},{p:1,c:[220,225,225]}], // winter
  ];
  const ss=skyCols[seasonIdx];
  for(let y=0;y<gY-25;y++){
    const t=y/(gY-25);let c;
    for(let i=0;i<ss.length-1;i++){
      if(t>=ss[i].p&&t<=ss[i+1].p){
        const lt=(t-ss[i].p)/(ss[i+1].p-ss[i].p);
        c=ss[i].c.map((v,j)=>Math.round(v+(ss[i+1].c[j]-v)*lt));break;
      }
    }
    if(!c)c=ss[ss.length-1].c;
    ctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;
    ctx.fillRect(0,y,W,1);
  }

  // ── Clouds ──
  ctx.fillStyle=seasonIdx===3?'rgba(200,210,220,0.5)':'rgba(255,255,255,0.4)';
  [[time*2.2,28,18],[time*1.6+75,48,14],[time*1.1+145,65,20]].forEach(([xb,cy,cw])=>{
    const cx=((xb)%(W+50))-25;
    for(let y=0;y<4;y++){const ind=y===0||y===3?3:y===1||y===2?1:0;ctx.fillRect(Math.floor(cx)+ind,cy+y,cw-ind*2,1);}
  });

  // ── Sun ──
  if(seasonIdx!==3){
    const sx=155,sy=22+Math.sin(time*0.3)*2;
    for(let r=10;r>0;r--){ctx.fillStyle=`rgba(255,220,100,${0.06*(1-r/10)})`;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#FFE070';ctx.fillRect(sx-3,sy-3,6,6);
  }

  // ── Hills ──
  const hc=[[100,160,100],[80,145,75],[155,130,90],[170,175,180]][seasonIdx];
  const hc2=hc.map(v=>Math.max(0,v-20));
  for(let x=0;x<W;x++){const h=20+Math.sin(x*0.025)*15+Math.sin(x*0.06)*6;ctx.fillStyle=`rgb(${hc2[0]},${hc2[1]},${hc2[2]})`;ctx.fillRect(x,gY-48-h,1,h+48);}
  for(let x=0;x<W;x++){const h=14+Math.sin(x*0.04+2)*10+Math.sin(x*0.08)*4;ctx.fillStyle=`rgb(${hc[0]},${hc[1]},${hc[2]})`;ctx.fillRect(x,gY-30-h,1,h+30);}

  // ── Ground ──
  const gc=[['#5A9A3A','#4A8A2A','#6AAA4A'],['#4A8A2A','#3A7A1A','#5A9A3A'],['#8A7A3A','#7A6A2A','#9A8A4A'],['#A0A898','#90988A','#B0B8A8']][seasonIdx];
  const rn=seed(123);
  for(let y=gY;y<gY+22;y++)for(let x=0;x<W;x++){ctx.fillStyle=gc[Math.floor(rn()*gc.length)];ctx.fillRect(x,y,1,1);}
  // Grass blades
  const bladeCols=[['#7ABA5A','#8ACA6A'],['#6AAA4A','#7ABA5A'],['#AA9A4A','#9A8A3A'],['#B8C0B0','#A8B0A0']][seasonIdx];
  const br=seed(456);
  for(let i=0;i<70;i++){const bx=Math.floor(br()*W),bh=2+Math.floor(br()*3);ctx.fillStyle=bladeCols[Math.floor(br()*2)];ctx.fillRect(bx,gY-bh,1,bh);}
  // Dirt
  const dc=['#6A4A30','#5A3A20','#7A5A40'];
  for(let y=gY+22;y<H-48;y++)for(let x=0;x<W;x++){ctx.fillStyle=dc[Math.floor(rn()*dc.length)];ctx.fillRect(x,y,1,1);}

  // ── Flowers from Tiny Garden (seasonal) ──
  if(seasonIdx<3){ // no flowers in winter
    const flowers=[
      {sx:0,sy:0,x:15,y:gY-6},{sx:16,sy:0,x:32,y:gY-5},{sx:32,sy:0,x:52,y:gY-6},
      {sx:48,sy:0,x:130,y:gY-5},{sx:0,sy:16,x:142,y:gY-6},{sx:16,sy:16,x:165,y:gY-5},
      {sx:0,sy:64,x:28,y:gY-9},{sx:16,sy:64,x:120,y:gY-8},{sx:32,sy:64,x:170,y:gY-9},
      {sx:32,sy:16,x:70,y:gY-5},{sx:48,sy:16,x:155,y:gY-4},
    ];
    flowers.forEach(f=>{
      const sw=f.sy>=64?Math.sin(time*1.5+f.x)*0.5:0;
      ctx.drawImage(imgs.objects,f.sx,f.sy,16,16,f.x+sw,f.y,10,10);
    });
  }
  // Winter: snowflakes on ground
  if(seasonIdx===3){
    const sr=seed(999);
    for(let i=0;i<30;i++){
      ctx.fillStyle=`rgba(255,255,255,${0.3+sr()*0.4})`;
      ctx.fillRect(Math.floor(sr()*W),gY-2+Math.floor(sr()*4),2,1);
    }
  }

  // ── Fence ──
  const fenceCol=seasonIdx===3?'#8A7A6A':'#8A6840';
  const fenceHL=seasonIdx===3?'#A09888':'#A08860';
  ctx.fillStyle=fenceCol;
  for(let i=0;i<4;i++){const fx=12+i*7;ctx.fillRect(fx,gY-10,2,12);ctx.fillRect(fx-1,gY-8,4,2);ctx.fillRect(fx-1,gY-2,4,2);}
  ctx.fillStyle=fenceHL;
  ctx.fillRect(10,gY-7,30,1);ctx.fillRect(10,gY-1,30,1);

  // ── Pond ──
  const pondX=148,pondY=gY+3;
  const waterCol=seasonIdx===3?'#8AAAC0':'#5098C0';
  const waterLight=seasonIdx===3?'#A0C0D0':'#70B8E0';
  ctx.fillStyle=waterCol;
  ctx.beginPath();ctx.ellipse(pondX+16,pondY+8,18,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=waterLight;
  ctx.beginPath();ctx.ellipse(pondX+16,pondY+6,14,7,0,0,Math.PI*2);ctx.fill();
  // Shimmer
  const sh=0.15+0.12*Math.sin(time*2.5);
  ctx.fillStyle=`rgba(200,240,255,${sh})`;
  ctx.fillRect(pondX+8,pondY+4,8,2);
  // Ice in winter
  if(seasonIdx===3){ctx.fillStyle='rgba(220,230,240,0.3)';ctx.beginPath();ctx.ellipse(pondX+16,pondY+6,14,7,0,0,Math.PI*2);ctx.fill();}

  // ── TREE from spritesheet ──
  const treeImg=imgs['tree'+treeIdx];
  if(treeImg){
    const col=getTreeCol(stageIdx);
    const row=SEASON_ROW[seasonIdx];
    const sx=col*TW, sy=row*TH;
    const scale=2.5;
    const drawW=TW*scale, drawH=TH*scale;
    const treeX=W/2-drawW/2;
    const treeY=gY-drawH+12;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.06)';
    for(let i=0;i<3;i++)ctx.fillRect(treeX+10+i,gY+1+i,drawW-20-i*2,1);

    // Sway
    const sway=Math.sin(time*0.7)*0.008;
    ctx.save();
    ctx.translate(treeX+drawW/2,gY);
    ctx.rotate(sway);
    ctx.drawImage(treeImg,sx,sy,TW,TH,-drawW/2,-(drawH-12),drawW,drawH);
    ctx.restore();
  }

  // ── Animals ──
  animals.forEach(a=>{
    a.timer+=0.016;
    // Simple walk cycle
    a.x=a.base+Math.sin(time*a.speed+a.base)*a.range;
    a.frame=Math.floor(time*4)%4; // 4-frame walk
    const ay=gY+2;

    if(a.type==='chicken'&&imgs.chicken){
      // Walk right row: row 3, 6 frames, cell 64x64
      const fx=a.frame*CW, fy=0; // row 0 = walk down (idle-ish)
      const dir=Math.sin(time*a.speed+a.base)>0?1:-1;
      ctx.save();
      if(dir<0){ctx.translate(a.x+10,0);ctx.scale(-1,1);ctx.drawImage(imgs.chicken,fx,fy,CW,CH,-10,ay-18,22,22);}
      else ctx.drawImage(imgs.chicken,fx,fy,CW,CH,a.x,ay-18,22,22);
      ctx.restore();
    }
    if(a.type==='duck'&&imgs.duck){
      const fx=a.frame*DW, fy=0;
      const dir=Math.sin(time*a.speed+a.base)>0?1:-1;
      ctx.save();
      if(dir<0){ctx.translate(a.x+10,0);ctx.scale(-1,1);ctx.drawImage(imgs.duck,fx,fy,DW,DH,-10,ay-16,20,20);}
      else ctx.drawImage(imgs.duck,fx,fy,DW,DH,a.x,ay-16,20,20);
      ctx.restore();
    }
    if(a.type==='chick'&&imgs.chick){
      const fx=(a.frame%3)*KW, fy=0;
      ctx.drawImage(imgs.chick,fx,fy,KW,KH,a.x,ay-10,12,12);
    }
  });

  // ── Lantern ──
  const lx=42,ly=gY-14;
  ctx.fillStyle='#3A3A3A';ctx.fillRect(lx,ly,3,2);ctx.fillRect(lx-1,ly+2,5,3);ctx.fillRect(lx,ly+5,3,7);
  ctx.fillStyle='#FFA030';ctx.fillRect(lx,ly+3,3,1);
  const lg=0.05+0.03*Math.sin(time*3);
  for(let r=6;r>0;r--){ctx.fillStyle=`rgba(255,180,60,${lg*(1-r/6)})`;ctx.beginPath();ctx.arc(lx+1.5,ly+3,r,0,Math.PI*2);ctx.fill();}

  // ── Particles (petals/leaves/snow) ──
  const petalCols=[['#FFB7C5','#FFD4DE','#FFF0F2'],['#90C070','#B0D890'],['#C0903A','#D0A04A','#AA7030'],['#E8E8F0','#D8D8E8','#FFFFFF']][seasonIdx];
  const rate=stageIdx>=2?0.12:stageIdx>=1?0.06:0.02;
  if(Math.random()<rate){
    const px=W/2-30+Math.random()*60;
    const py=seasonIdx===3?(Math.random()*gY*0.3):(gY-70+Math.random()*20);
    particles.push({x:px,y:py,vx:0.2+Math.random()*0.4,vy:0.3+Math.random()*0.3,life:1,col:petalCols[Math.floor(Math.random()*petalCols.length)]});
  }
  particles=particles.filter(p=>{
    p.x+=p.vx+Math.sin(time*2+p.x*0.1)*0.3;p.y+=p.vy;p.life-=0.005;
    if(p.life<=0||p.y>gY+8)return false;
    ctx.globalAlpha=p.life*0.7;ctx.fillStyle=p.col;
    const s=seasonIdx===3?1:2;
    ctx.fillRect(Math.floor(p.x),Math.floor(p.y),s,s);
    ctx.globalAlpha=1;return true;
  });

  // ── Fireflies (evening) ──
  if(stageIdx>=2){
    for(let i=0;i<4;i++){
      const sr=seed(i*17+33);
      const fx=40+sr()*120+Math.sin(time*0.5+i*2)*8;
      const fy=gY-50+sr()*30+Math.cos(time*0.6+i*1.5)*5;
      const b=0.1+0.3*(0.5+0.5*Math.sin(time*2.5+i*1.8));
      ctx.fillStyle=`rgba(255,230,100,${b*0.1})`;
      ctx.beginPath();ctx.arc(fx,fy,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(255,240,150,${b})`;
      ctx.fillRect(Math.floor(fx),Math.floor(fy),2,2);
    }
  }

  // ── Hay pile from accessories (near fence) ──
  if(imgs.accessories){
    ctx.drawImage(imgs.accessories,0,0,48,32,2,gY-8,12,8);
  }

  // ── Info bar ──
  const by=H-48;
  ctx.fillStyle='rgba(15,15,25,0.85)';
  rRect(6,by,W-12,40,8);
  // Avatar
  ctx.fillStyle='#F0D0A0';ctx.fillRect(12,by+10,6,6);
  ctx.fillStyle='#805030';ctx.fillRect(12,by+6,6,5);
  ctx.fillStyle='#FFA060';ctx.fillRect(12,by+15,6,3);
  // Name
  ctx.fillStyle='#f0e8d8';ctx.font='bold 7px Courier New';ctx.fillText('Julie',24,by+14);
  const treeNames=['Pommier','Oranger','Pecher','Prunier','Poirier'];
  const stageNames=['Graine','Pousse','Arbuste','Arbre'];
  const seasonNames=['Printemps','Ete','Automne','Hiver'];
  ctx.fillStyle='#908878';ctx.font='5px Courier New';
  ctx.fillText(`${treeNames[treeIdx]} - ${stageNames[stageIdx]}`,24,by+23);
  ctx.fillStyle='#706858';ctx.fillText(seasonNames[seasonIdx],24,by+31);
  // XP
  const xpVals=['12/50','120/200','480/800','2.4k/3k'];
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(24,by+34,W-70,3);
  const xpPct=[0.24,0.6,0.6,0.8][stageIdx];
  ctx.fillStyle='#FFD860';ctx.fillRect(24,by+34,Math.floor((W-70)*xpPct),3);
  ctx.fillStyle='#a09080';ctx.font='5px Courier New';ctx.fillText(xpVals[stageIdx],W-52,by+37);

  requestAnimationFrame(render);
}

function rRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();}

function setStage(i){stageIdx=i;particles=[];document.querySelectorAll('#sc .btn').forEach((b,j)=>b.classList.toggle('active',j===i));}
function setTree(i){treeIdx=i;document.querySelectorAll('#tc .btn').forEach((b,j)=>b.classList.toggle('active',j===i));}
function setSeason(i){seasonIdx=i;particles=[];document.querySelectorAll('#ssc .btn').forEach((b,j)=>b.classList.toggle('active',j===i));}
</script>
</body>
</html>
