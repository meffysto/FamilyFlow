// ─── Helpers ──────────────────────────────────────
function seeded(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};}
function lerpC(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t));}

function drawGrad(y0,y1,stops){
  for(let y=y0;y<y1;y++){
    const t=(y-y0)/(y1-y0);let c;
    for(let i=0;i<stops.length-1;i++){
      if(t>=stops[i].p&&t<=stops[i+1].p){
        const lt=(t-stops[i].p)/(stops[i+1].p-stops[i].p);
        c=lerpC(stops[i].c,stops[i+1].c,lt);break;
      }
    }
    if(!c)c=stops[stops.length-1].c;
    ctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;
    ctx.fillRect(0,y,W,1);
  }
}

function drawDeco(d){
  if(d.id==='rainbow')return; // special
  const def=DECOS[d.id]; if(!def||def==='special_rainbow')return;
  const PX=2;
  def.forEach((row,y)=>{
    row.forEach((col,x)=>{
      if(!col)return;
      ctx.fillStyle=col;
      ctx.fillRect(d.x+x*PX,d.y+y*PX,PX,PX);
    });
  });
}

function drawRainbow(){
  const cx=W/2, cy=100, r=70;
  const colors=['#ff4040','#ff8040','#ffff40','#40ff40','#4040ff','#8040ff'];
  colors.forEach((c,i)=>{
    ctx.strokeStyle=c;
    ctx.globalAlpha=0.12;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(cx,cy,r+i*3,-Math.PI,-0.05);
    ctx.stroke();
  });
  ctx.globalAlpha=1;
}

    ?[{p:0,c:[15,15,40]},{p:0.3,c:[25,20,55]},{p:0.7,c:[40,35,65]},{p:1,c:[55,50,70]}]
    :[{p:0,c:[130,185,225]},{p:0.35,c:[165,210,238]},{p:0.7,c:[195,225,205]},{p:1,c:[215,232,198]}];
  drawGrad(0,gY,skyS);

  // Stars
  if(isNight){const rn=seeded(42);for(let i=0;i<50;i++){const sx=rn()*W,sy=rn()*gY*0.55,b=0.2+0.8*(0.5+0.5*Math.sin(time*2+i*1.7)),sz=rn()>0.85?2:1;ctx.fillStyle=`rgba(255,255,240,${b})`;ctx.fillRect(Math.floor(sx),Math.floor(sy),sz,sz);}}

  // Sun/Moon
  if(!isNight){
    const sx=160,sy=28+Math.sin(time*0.3)*2;
    for(let r=18;r>0;r--){ctx.fillStyle=`rgba(255,220,100,${0.12*(1-r/18)})`;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#ffe070';ctx.fillRect(sx-4,sy-4,8,8);
    ctx.fillStyle='#fff0a0';ctx.fillRect(sx-2,sy-2,4,4);
  } else {
    const mx=155,my=32;
    ctx.fillStyle='#d8e0e8';ctx.fillRect(mx-4,my-4,8,8);
    ctx.fillStyle='#b8c0c8';ctx.fillRect(mx-2,my-1,3,3);
    for(let r=12;r>4;r--){ctx.fillStyle=`rgba(200,210,230,${0.025})`;ctx.beginPath();ctx.arc(mx,my,r,0,Math.PI*2);ctx.fill();}
  }

  // Hills (depth)
  const h2c=isNight?[35,40,55]:[125,160,120];
  const h1c=isNight?[42,48,62]:[145,175,135];
  for(let x=0;x<W;x++){const h=28+Math.sin(x*0.025+1)*18+Math.sin(x*0.06)*8;ctx.fillStyle=`rgb(${h2c[0]},${h2c[1]},${h2c[2]})`;ctx.fillRect(x,gY-48-h,1,h+48);}
  for(let x=0;x<W;x++){const h=18+Math.sin(x*0.04+3)*14+Math.sin(x*0.08+1)*6;ctx.fillStyle=`rgb(${h1c[0]},${h1c[1]},${h1c[2]})`;ctx.fillRect(x,gY-28-h,1,h+28);}

  // Clouds
  if(!isNight){
    [[time*3,38,16],[time*2+80,62,12],[time*1.5+150,82,18]].forEach(([xBase,cy,cw])=>{
      const cx=((xBase)%(W+40))-20;
      ctx.fillStyle='rgba(255,255,255,0.45)';
      for(let y=0;y<4;y++){const ind=y===0||y===3?3:y===1||y===2?1:0;ctx.fillRect(Math.floor(cx)+ind,cy+y,cw-ind*2,1);}
    });
  }

  // Rainbow (stages 0-1 for kids!)
  const hasRainbow = SCENE_DECOS[stage].some(d=>d.id==='rainbow');
  if(hasRainbow && !isNight) drawRainbow();

  // Ground — grass
  const gc=isNight?['#2a4a2a','#1a3a1a','#2a5a2a']:['#5a9a3a','#4a8a2a','#6aaa4a','#5a9a3a'];
  const rn=seeded(123);
  for(let y=gY;y<gY+22;y++)for(let x=0;x<W;x++){ctx.fillStyle=gc[Math.floor(rn()*gc.length)];ctx.fillRect(x,y,1,1);}
  // Grass blades
  const bc=isNight?['#3a6a3a','#2a5a2a']:['#7aba5a','#8aca6a','#6aaa4a'];
  const br=seeded(456);
  for(let i=0;i<80;i++){const bx=Math.floor(br()*W),bh=2+Math.floor(br()*4);ctx.fillStyle=bc[Math.floor(br()*bc.length)];ctx.fillRect(bx,gY-bh,1,bh);}
  // Dirt
  const dc=isNight?['#2a1a10','#3a2a18']:['#6a4a30','#5a3a20','#7a5a40'];
  for(let y=gY+22;y<H-55;y++)for(let x=0;x<W;x++){ctx.fillStyle=dc[Math.floor(rn()*dc.length)];ctx.fillRect(x,y,1,1);}

  // Decorations behind tree
  const decos=SCENE_DECOS[stage]||[];
  decos.filter(d=>d.x<W/2-15).forEach(d=>drawDeco(d));

  // Tree
  const tree=parseTree(TREES[stage]);
  const PX=2;
  const treeX=Math.floor(W/2-(tree.w*PX)/2);
  const treeY=gY-tree.h*PX+4;
  const sway=Math.sin(time*0.8)*(stage>=3?1.5:0.8);
  for(let y=0;y<tree.h;y++){
    const row=tree.rows[y];
    const sf=1-(y/tree.h);
    for(let x=0;x<row.length;x++){
      const ch=row[x];if(ch==='0')continue;
      const col=treeColor(ch,sp);if(!col)continue;
      ctx.fillStyle=col;
      const px=Math.floor(treeX+x*PX+sway*sf);
      ctx.fillRect(px,treeY+y*PX,PX,PX);
      if(ch==='A'&&stage===5){
        const g=0.3+0.2*Math.sin(time*3+x+y);
        ctx.fillStyle=`rgba(255,255,200,${g})`;
        ctx.fillRect(px-1,treeY+y*PX-1,PX+2,PX+2);
      }
    }
  }

  // Shadow
  const sw=tree.w*PX+8+stage*4;
  ctx.fillStyle=`rgba(0,0,0,${isNight?0.15:0.08})`;
  for(let i=0;i<3;i++)ctx.fillRect(Math.floor(W/2-sw/2+i),gY+1+i,sw-i*2,1);

  // Decorations in front
  decos.filter(d=>d.x>=W/2-15).forEach(d=>drawDeco(d));

  // Pond shimmer
  decos.filter(d=>d.id==='pond').forEach(d=>{
    const shimmer=0.3+0.15*Math.sin(time*2);
    ctx.fillStyle=`rgba(160,220,255,${shimmer})`;
    ctx.fillRect(d.x+4,d.y+4,4,2);
  });

  // Lantern glow
  decos.filter(d=>d.id==='lantern').forEach(d=>{
    const g=0.08+0.04*Math.sin(time*3);
    for(let r=10;r>0;r--){ctx.fillStyle=`rgba(255,180,60,${g*(1-r/10)})`;ctx.beginPath();ctx.arc(d.x+3,d.y+5,r,0,Math.PI*2);ctx.fill();}
  });

  // Particles
  const rate=stage>=4?0.18:stage>=2?0.1:stage>=1?0.05:0.02;
  if(Math.random()<rate){
    particles.push({x:W/2-25+Math.random()*50,y:gY-45-Math.random()*60,vx:0.2+Math.random()*0.4,vy:0.3+Math.random()*0.3,life:1,size:1+Math.floor(Math.random()*2),color:sp.petal,rot:Math.random()*6.28,rs:(Math.random()-0.5)*0.1});
  }
  particles=particles.filter(p=>{
    p.x+=p.vx+Math.sin(time*2+p.rot)*0.3;p.y+=p.vy;p.rot+=p.rs;p.life-=0.005;
    if(p.life<=0||p.y>gY+8)return false;
    ctx.globalAlpha=p.life*0.7;ctx.fillStyle=p.color;ctx.fillRect(Math.floor(p.x),Math.floor(p.y),p.size,p.size);ctx.globalAlpha=1;
    return true;
  });

  // Fireflies
  if(stage>=3){
    const mx=stage===5?10:4;
    if(fireflies.length<mx&&Math.random()<0.02)fireflies.push({x:30+Math.random()*(W-60),y:gY-30-Math.random()*80,ph:Math.random()*6.28,sp:0.5+Math.random()*0.5});
    fireflies=fireflies.filter(f=>{
      f.x+=Math.sin(time*f.sp+f.ph)*0.4;f.y+=Math.cos(time*f.sp*0.7+f.ph)*0.3;
      const b=0.4+0.6*(0.5+0.5*Math.sin(time*3+f.ph));
      const col=isNight?sp.glow:'#ffe060';
      ctx.fillStyle=col+Math.floor(b*40).toString(16).padStart(2,'0');
      ctx.beginPath();ctx.arc(f.x,f.y,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=col+Math.floor(b*255).toString(16).padStart(2,'0');
      ctx.fillRect(Math.floor(f.x),Math.floor(f.y),2,2);
      return f.y>gY-120&&f.y<gY;
    });
  }

  // Critters (butterfly, ladybug movement)
  if(critters.length<2&&Math.random()<0.005){
    critters.push({type:Math.random()>0.5?'butterfly':'ladybug',x:Math.random()*W,y:gY-10-Math.random()*50,vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.3,life:300+Math.random()*200});
  }
  critters=critters.filter(c=>{
    c.x+=c.vx+Math.sin(time*2)*0.3;c.y+=c.vy+Math.cos(time*1.5)*0.2;c.life--;
    if(c.life<=0||c.x<-10||c.x>W+10)return false;
    if(c.type==='butterfly'){
      const wingF=Math.sin(time*12)*0.5;
      ctx.fillStyle='#ffa040';ctx.fillRect(Math.floor(c.x)-2,Math.floor(c.y),2,Math.floor(2+wingF));
      ctx.fillStyle='#ff8020';ctx.fillRect(Math.floor(c.x)+1,Math.floor(c.y),2,Math.floor(2+wingF));
      ctx.fillStyle='#402820';ctx.fillRect(Math.floor(c.x),Math.floor(c.y),1,2);
    } else {
      ctx.fillStyle='#e02020';ctx.fillRect(Math.floor(c.x),Math.floor(c.y),3,2);
      ctx.fillStyle='#101010';ctx.fillRect(Math.floor(c.x)+1,Math.floor(c.y),1,2);
    }
    return true;
  });

  // Info bar
  const by=H-52;
  ctx.fillStyle='rgba(20,18,30,0.8)';
  ctx.beginPath();ctx.moveTo(12,by);ctx.lineTo(W-12,by);ctx.quadraticCurveTo(W-8,by,W-8,by+4);ctx.lineTo(W-8,by+40);ctx.quadraticCurveTo(W-8,by+44,W-12,by+44);ctx.lineTo(12,by+44);ctx.quadraticCurveTo(8,by+44,8,by+40);ctx.lineTo(8,by+4);ctx.quadraticCurveTo(8,by,12,by);ctx.fill();
  // Avatar pixels
  ctx.fillStyle='#f0d0a0';ctx.fillRect(16,by+12,6,6);
  ctx.fillStyle='#805030';ctx.fillRect(16,by+8,6,5);
  ctx.fillStyle='#ffa060';ctx.fillRect(16,by+17,6,3);
  // Text
  ctx.fillStyle='#f0e8d8';ctx.font='bold 7px Courier New';ctx.fillText('Julie',28,by+16);
  ctx.fillStyle='#908878';ctx.font='5px Courier New';
  const sn={cherry:'Cerisier',oak:'Chene',bamboo:'Bambou',orange:'Oranger',palm:'Palmier'}[species];
  ctx.fillText(`${sn} - ${STAGE_INFO[stage].label}`,28,by+26);
  // XP
  ctx.fillStyle='rgba(255,220,100,0.18)';
  ctx.fillRect(W-52,by+10,38,14);
  ctx.fillStyle='#ffd860';ctx.font='bold 6px Courier New';ctx.fillText(STAGE_INFO[stage].xp,W-50,by+20);

  requestAnimationFrame(render);
}

const STAGE_INFO=[{label:'Graine',xp:'0/50'},{label:'Pousse',xp:'120/200'},{label:'Arbuste',xp:'480/800'},{label:'Arbre',xp:'1.8k/3k'},{label:'Majestueux',xp:'5.2k/8k'},{label:'Legendaire',xp:'12k/15k'}];

function setStage(i){stage=i;particles=[];fireflies=[];critters=[];document.querySelectorAll('#stage-controls .btn').forEach((b,idx)=>b.classList.toggle('active',idx===i));}
function setSp(s){species=s;particles=[];const names={cherry:'cerisier',oak:'chene',bamboo:'bambou',orange:'oranger',palm:'palmier'};document.querySelectorAll('#species-controls .btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===names[s]));}

render();
</script>
</body>
